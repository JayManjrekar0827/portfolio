<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Jay Manjrekar</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <main class="page">
    <h1>Contact</h1>

    <form class="contact-form" action="mailto:jaymanjrekar@gmail.com" method="POST" enctype="text/plain">
      <label>
        <span>Email</span>
        <input type="email" name="email" value="visitor@example.com">
      </label>
      <label>
        <span>Subject</span>
        <input name="subject" value="Hello from your portfolio site">
      </label>
      <label>
        <span>Message</span>
        <textarea name="body" rows="6" cols="40">This is a test message. Replace the default values while you develop.</textarea>
      </label>
      <button>Send</button>
    </form>
  </main>
  <script type="module" src="../global.js"></script>
</body>
</html>
